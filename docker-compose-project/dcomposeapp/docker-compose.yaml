version: '3.1'

services:

  php:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: testdb

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080