<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page p1 | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset & Smooth Background */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e7eb;
            color: #1f2937;
        }

        /* Glassmorphism Container */
        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            transition: transform 0.3s ease;
            animation: fadeIn 0.8s ease-out;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* Typography Improvements */
        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 16px;
            color: #111827;
            letter-spacing: -0.025em;
        }

        p {
            font-weight: 300;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 24px;
        }

        /* Docker/Nginx Badge Styling */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: #dcfce7;
            color: #166534;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Subtle Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========================= */
        /* 📱 Responsive Design */
        /* ========================= */

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.6rem;
            }

            p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 30px;
            }

            .container {
                width: 100%;
                padding: 25px 18px;
                border-radius: 18px;
            }

            h1 {
                font-size: 1.4rem;
            }

            p {
                font-size: 0.95rem;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 5px 14px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Container Active</div>
        <h1>Welcome to page p1</h1>
        <p>This interface is powered by <strong>Nginx</strong> within a secure <strong>Docker</strong> environment.</p>
    </div>
</body>
</html>
