<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Ateliers Docker</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f6fa;
      color: #2f3640;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: #273c75;
      color: white;
      width: 100%;
      text-align: center;
      padding: 25px 0;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #dcdde1;
    }

    main {
      max-width: 800px;
      width: 90%;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card h2 {
      margin: 0 0 10px 0;
      color: #192a56;
      font-size: 20px;
    }

    .card p {
      margin: 0 0 15px 0;
      color: #718093;
      font-size: 14px;
    }

    a {
      display: inline-block;
      background: #0097e6;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s ease;
      margin-top: 7px;
    }

    a:hover {
      background: #40739e;
    }

    footer {
      margin-top: 40px;
      color: #888;
      font-size: 14px;
      padding: 20px;
      text-align: center;
    }

    .copy-btn {
      display: inline-block;
      background: #8c7ae6; /* Purple shade to differentiate from the blue links */
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 7px;
      font-size: 17px;
    }

    .copy-btn:hover {
      background: #7158e2;
    }

    .copy-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <header>
    <h1>Les Ateliers Docker</h1>
    <p>Launch Docker workshops and view their results</p>
  </header>

  <main>
    <div class="card">
      <h2>Atelier 7</h2>
      <p>Création d'une Image Docker avec Nginx</p>
      <a href="reports/Atelier_7_Docker.pdf">Open Atelier 7</a>
      <a href="https://hub.docker.com/repository/docker/msbenyaishe/atelier7-docker-nginx/general">Docker Hub Repository</a>
    </div>

    <div class="card">
      <h2>Atelier 8</h2>
      <p>Développement et Déploiement d’une Application Web Dockerisée</p>
      <a href="reports/Atelier_8_Docker.pdf">Open Atelier 8</a>

      <button class="copy-btn" onclick="copyDockerCommand(this)">
        Copy Docker Run Command
      </button>

      <script>
        function copyDockerCommand(button) {
          const command = "docker run -p 4000:4000 msbenyaishe/atelier8-ramadan-app";
          
          navigator.clipboard.writeText(command).then(() => {
            // Optional: Visual feedback
            const originalText = button.innerText;
            button.innerText = "Copied!";
            button.style.background = "#44bd32"; // Success green
            
            setTimeout(() => {
              button.innerText = originalText;
              button.style.background = "#8c7ae6"; // Back to original color
            }, 2000);
          });
        }
      </script>
    </div>
  </main>

  <footer>
    © 2026 — Mohamed Said Benyaich | DEVOWFS203
  </footer>

</body>
</html>
